<body>
    <script>
        let mysteryLevel = Math.floor(Math.random()*50) + 1;
        console.log(mysteryLevel);

        let userInputScore = "45";
        let userScore = Number(userInputScore);
        console.log(userScore);

        let difference = mysteryLevel - userScore;
        console.log(difference);

        let sqrtUserScore = Math.sqrt(userScore);
       // let roundedSqrt = Math.round(sqrtUserScore);
        console.log(sqrtUserScore);

        let piValue = Math.PI;
        console.log(piValue);

        let implicitConversion = "20" * 5;
        console.log(implicitConversion);

        let highest = Math.max (10,20,mysteryLevel);
        console.log(highest);
        let lowest = Math.min (10,20,mysteryLevel);
        console.log(lowest);

    </script>
