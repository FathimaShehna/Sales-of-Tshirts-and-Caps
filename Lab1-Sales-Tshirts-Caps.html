<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales</title>
</head>
<body>
    <script>
        var x = 5; //x indicates t-shirts
        var y = 400; //y indicates the price of t-shirts
        var z = 3; //z indicates caps
        var a = 150; //a indicates the price of caps

        var total = (x * y) + (z * a);
        console.log("The total earnings from the sale is: " + total);

       var y=450; //indicates the change of price of t-shirts 
       var totalNew = (x * y) + (z * a);
       console.log("The new total earnings from the sale is: " + totalNew);
    </script>
</body>
</html>
