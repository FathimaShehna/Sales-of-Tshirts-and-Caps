<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Message</title>
</head>
<body>
    <script>
        let feedback = JSON.parse('{"name": "Sam", "email": "sam@test.com","message": "I really enjoyed the course! Thank you so much" }');
        
        messagePrint = () => {
            var msg = /Thank/i;
            var result = msg.test(feedback.message);
            console.log(result);
            if (result) {
                console.log("Positive feedback received");
            }
            else {
                console.log("Feedback noted");
            }

            try {               //error handling
            console.log("No error");
        } catch (error) {
            console.error("An error occurred");
        }
             
        }
        messagePrint();
    </script>
</body>
</html>
