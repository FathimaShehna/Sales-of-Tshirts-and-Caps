<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Reminder Tool</title>
</head>
<body>


     <script>
      
        function checkdate() {

            var input = prompt("Enter a date (YYYY-MM-DD):");
        
            var dat = new Date(input);
            var eventday = dat.getDate();
            var eventYear = dat.getFullYear();
            var eventMonth = ["January", "February", "March", "April", "May", "June",
             "July", "August", "September", "October", "November", "December"];
             var month = eventMonth[dat.getMonth()];

             var diffYear = new Date();
             let diff = diffYear.getFullYear() - eventYear;

             console.log(month + " " + eventday + ", " + eventYear + " and is in " + diff + " years.");

             if (diff  >1) {
                console.log("It has been more than a year since that date.");
             } else {
                console.log("It has been less than a year since that date.");
             }
        }
        checkdate();
    </script>
</body>
</html>
