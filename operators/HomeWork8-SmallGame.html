<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
</head>
<body>
    <script>
let chances = 0;

while (chances < 5) {

    let input = parseInt(prompt("Enter a number between 1 and 5:"));

     if (input === 3) {
        console.log("You guessed it right!");
        break; 
    } else {
        console.log("Wrong guess. Try again.");
    }

    if (input <1 || input >5) {
        console.log("Invalid Input");
        continue;
    }

    if (chances === 5) {
    console.log("Game over");
}

    let word = "";
    switch (input) {
        case 1:
            word = "One";
            break;
        case 2:
            word = "Two";
            break;
        case 3:
            word = "Three";
            break;
        case 4:
            word = "Four";
            break;
        case 5:
            word = "Five";
            break;
    }

    console.log("You entered: " + word);

    chances++;
}

</script>

</body>
</html>
