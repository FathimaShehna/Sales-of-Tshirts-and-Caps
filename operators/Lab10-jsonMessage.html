<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Json Message</title>
</head>
<body>
    <script>
        //converting json string to javascript object
        var details =JSON.parse('{"name": "john","email": "john@test.com", "message": "Hello, this is John!"}');
        console.log(details);

        console.log(details.name);
        console.log(details.email);         
        console.log(details.message);

        var messagePrint;

        messagePrint = () => {       //using arrow function
         //   console.log("Message received from " + details.name + " is: " +details.message);
        try {               //error handling
            messagePrint();
        } catch (error) {
            console.error("An error occurred: " + error.message);
        }
        }

        messagePrint();


    </script>
</body>
</html>
