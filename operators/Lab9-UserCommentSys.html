<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Comment System</title>
</head>
<body>
    <script>
        var str =  "My son is 12 years old. Our flat number is 45 and contact is 9876543210."
        var patt = /\d/gi;
        var result = str.match(patt);
        console.log(result);

        var hasnumber = /\d/.test(str);

        if(hasnumber) {
            console.log ("True");
            var newStr = str.replace(patt, "NUMBER");
            console.log(newStr);
        }
        else {
            console.log ("False");
        }

    </script>
</body>
</html>
