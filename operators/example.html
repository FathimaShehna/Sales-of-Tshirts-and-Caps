<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Text Display</title>
    <style>
        #outputText {
            color: blue;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <form id="myForm">
        <input type="text" id="userInput" placeholder="Enter something" required>
        <button type="submit">Submit</button>
    </form>

    <p id="outputText"></p>

    <script>
        const form = document.getElementById("myForm");
        const input = document.getElementById("userInput");
        const output = document.getElementById("outputText");

        // Handle form submit
        form.addEventListener("submit", function(event) {
            event.preventDefault(); // prevent page reload
            output.textContent = input.value;
            output.style.color = "blue";
        });

        // Change color on hover
        output.addEventListener("mouseover", function() {
            output.style.color = "green";
        });

        // Change back on mouse out
        output.addEventListener("mouseout", function() {
            output.style.color = "blue";
        });
    </script>

</body>
</html>
